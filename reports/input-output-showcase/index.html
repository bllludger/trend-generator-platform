  <style>
    :root { --bg:#f6f7fb; --card:#fff; --text:#1f2937; --muted:#667085; --line:#e5e7eb; --accent:#2563eb; }
    *{box-sizing:border-box}
    body{margin:0;font-family:Segoe UI,Inter,Arial,sans-serif;background:linear-gradient(180deg,#f8fbff,#f6f7fb);color:var(--text)}
    .wrap{max-width:1500px;margin:0 auto;padding:18px}
    .hero,.panel,.card{background:var(--card);border:1px solid var(--line);border-radius:14px;box-shadow:0 8px 26px rgba(16,24,40,.06)}
    .hero{padding:18px;margin-bottom:14px}
    h1{margin:0;font-size:28px}
    .sub{margin:8px 0 0;color:var(--muted);font-size:14px}
    .stats{display:grid;grid-template-columns:repeat(auto-fit,minmax(170px,1fr));gap:10px;margin-top:12px}
    .stat{padding:12px;border:1px solid var(--line);border-radius:10px;background:#fafcff}
    .n{font-size:28px;font-weight:700;line-height:1}
    .l{font-size:12px;color:var(--muted);margin-top:6px}
    .panel{padding:12px;margin-bottom:14px;display:grid;grid-template-columns:1.5fr .8fr .8fr .8fr .8fr;gap:8px;align-items:end}
    .field label{display:block;font-size:12px;color:var(--muted);margin-bottom:5px}
    .field input,.field select{width:100%;height:38px;border:1px solid var(--line);border-radius:9px;padding:0 10px;background:#fff}
    .cards{display:grid;grid-template-columns:repeat(auto-fit,minmax(360px,1fr));gap:12px}
    .card{padding:12px}
    .meta{font-size:12px;color:var(--muted);display:flex;gap:8px;flex-wrap:wrap;margin-bottom:8px}
    .trend{font-weight:700;margin:2px 0 6px}
    .io{display:grid;grid-template-columns:1fr 1fr;gap:8px}
    .shot{border:1px solid var(--line);border-radius:10px;overflow:hidden;background:#fff}
    .lbl{font-size:11px;color:var(--muted);padding:7px 8px;border-bottom:1px solid var(--line);background:#fafafa}
    .shot img{width:100%;display:block;aspect-ratio:4/5;object-fit:cover;background:#eef2f7}
    .outs{display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:6px;margin-top:8px}
    .out{border:1px solid var(--line);border-radius:8px;overflow:hidden}
    .out .lbl{padding:5px 6px;font-size:10px}
    .out img{width:100%;display:block;aspect-ratio:1/1;object-fit:cover;background:#eef2f7}
    .missing{color:#b42318;font-size:11px;padding:6px 8px}
    .pager{display:flex;justify-content:space-between;align-items:center;margin:12px 0 4px;color:var(--muted);font-size:13px}
    button{height:34px;border:1px solid var(--line);border-radius:8px;background:#fff;padding:0 10px;cursor:pointer}
    button:disabled{opacity:.5;cursor:not-allowed}
    @media (max-width:1050px){.panel{grid-template-columns:1fr 1fr}}
    @media (max-width:780px){.io{grid-template-columns:1fr} .outs{grid-template-columns:repeat(2,minmax(0,1fr))}}
  </style>
</head>

  <script>
    const data = JSON.parse(document.getElementById('dataset').textContent);
    const els = {
      q: document.getElementById('q'), source: document.getElementById('source'), status: document.getElementById('status'),
      sort: document.getElementById('sort'), pageSize: document.getElementById('pageSize'), cards: document.getElementById('cards'),
      summary: document.getElementById('summary'), prev: document.getElementById('prev'), next: document.getElementById('next'),
      prev2: document.getElementById('prev2'), next2: document.getElementById('next2')
    };
    let page = 1;
    function esc(s){ return String(s ?? '').replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }
    function filtered(){
      const q = els.q.value.trim().toLowerCase();
      const source = els.source.value;
      const status = els.status.value;
      const sorted = [...data].filter(r => {
        if (source !== 'all' && r.source !== source) return false;
        if (status !== 'all' && (r.status || '') !== status) return false;
        if (!q) return true;
        const blob = [r.id, r.trend_name, r.status, r.type, r.created_at, r.input?.path || '', ...(r.outputs||[]).map(o => o.path)].join(' ').toLowerCase();
        return blob.includes(q);
      });
      sorted.sort((a,b)=> els.sort.value === 'old'
        ? String(a.created_at||'').localeCompare(String(b.created_at||''))
        : String(b.created_at||'').localeCompare(String(a.created_at||''))
      );
      return sorted;
    }
    function render(){
      const items = filtered();
      const ps = Math.max(1, Number(els.pageSize.value || 40));
      const pages = Math.max(1, Math.ceil(items.length / ps));
      if (page > pages) page = pages;
      const start = (page - 1) * ps;
      const part = items.slice(start, start + ps);
      els.summary.textContent = `Показано ${part.length} из ${items.length} • страница ${page}/${pages}`;
      els.cards.innerHTML = part.map(r => {
        const inShot = r.input ? `
          <div class="shot"><div class="lbl">Вход ${r.input.exists ? '' : '• missing'}</div>
          ${r.input.src && r.input.exists ? `<img loading="lazy" src="${esc(r.input.src)}" alt="input" />` : `<div class="missing">Файл не найден:<br><code>${esc(r.input.path || '')}</code></div>`}
          </div>`
          : `<div class="shot"><div class="lbl">Вход</div><div class="missing">Нет входного пути</div></div>`;
        const outItems = (r.outputs || []).map(o => `
          <div class="out"><div class="lbl">${esc(o.label)} ${o.exists ? '' : '• missing'}</div>
          ${o.src && o.exists ? `<img loading="lazy" src="${esc(o.src)}" alt="${esc(o.label)}" />` : `<div class="missing">Нет файла</div>`}
          </div>`).join('') || `<div class="out"><div class="lbl">Выход</div><div class="missing">Нет выходных файлов</div></div>`;
        return `
          <article class="card">
            <div class="meta"><span>${esc(r.source)}</span><span>${esc(r.status || '-')}</span><span>${esc(r.created_at || '-')}</span><span><code>${esc(r.id || '')}</code></span></div>
            <div class="trend">${esc(r.trend_name || '(no trend)')}</div>
            <div class="io">${inShot}<div class="shot"><div class="lbl">Выходы: ${(r.outputs||[]).length}</div><div class="outs">${outItems}</div></div></div>
          </article>`;
      }).join('');
      [els.prev, els.prev2].forEach(b => b.disabled = page <= 1);
      [els.next, els.next2].forEach(b => b.disabled = page >= pages);
    }
    [els.q, els.source, els.status, els.sort, els.pageSize].forEach(el => el.addEventListener('input', ()=>{ page = 1; render(); }));
    [els.next, els.next2].forEach(b => b.addEventListener('click', ()=>{ page++; render(); }));
    [els.prev, els.prev2].forEach(b => b.addEventListener('click', ()=>{ page--; render(); }));
    render();
  </script>
