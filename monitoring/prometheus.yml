# Prometheus config: scrape API metrics and optional exporters.
# Used by docker-compose service prometheus (volume monitoring/prometheus.yml).

global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: api
    static_configs:
      - targets: ["api:8000"]
    metrics_path: /metrics

  - job_name: bot
    static_configs:
      - targets: ["bot:8002"]
    metrics_path: /metrics
    scrape_interval: 15s

  - job_name: worker
    static_configs:
      - targets: ["worker:9091"]
    metrics_path: /metrics
    scrape_interval: 15s

  - job_name: node
    static_configs:
      - targets: ["node_exporter:9100"]
    metrics_path: /metrics

  - job_name: redis
    static_configs:
      - targets: ["redis_exporter:9121"]
    metrics_path: /metrics

  - job_name: postgres
    static_configs:
      - targets: ["postgres_exporter:9187"]
    metrics_path: /metrics
