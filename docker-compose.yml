services:
  admin-ui:
    build:
      context: ./admin-frontend
      dockerfile: Dockerfile
    ports:
      - "3000:80"
    depends_on:
      api:
        condition: service_healthy

  api:
    build: .
    env_file:
      - .env
    ports:
      - "127.0.0.1:8000:8000"
    volumes:
      - ./app:/app/app
      - ./migrations:/app/migrations
      - ./prompts:/app/prompts
      - ./data/generated_images:/data/generated_images
      - ./data/trend_examples:/app/data/trend_examples
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "curl -f --connect-timeout 5 --max-time 10 http://localhost:8000/health || exit 1"]
      interval: 10s
      timeout: 10s
      retries: 6
      start_period: 60s

  worker:
    build: .
    command: ["celery", "-A", "app.core.celery_app.celery_app", "worker", "--loglevel=INFO", "--concurrency=2", "-Q", "celery,generation"]
    env_file:
      - .env
    ports:
      - "127.0.0.1:9091:9091"
    volumes:
      - ./app:/app/app
      - ./migrations:/app/migrations
      - ./prompts:/app/prompts
      - ./data/generated_images:/data/generated_images
      - ./image:/app/image
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped

  beat:
    build: .
    command: ["celery", "-A", "app.core.celery_app.celery_app", "beat", "--loglevel=INFO"]
    env_file:
      - .env
    volumes:
      - ./app:/app/app
    depends_on:
      redis:
        condition: service_healthy
    restart: unless-stopped

  bot:
    build: .
    command: ["python", "-m", "app.bot.main"]
    env_file:
      - .env
    ports:
      - "127.0.0.1:8002:8002"
    volumes:
      - ./app:/app/app
      - ./migrations:/app/migrations
      - ./prompts:/app/prompts
      - ./data/generated_images:/data/generated_images
      - ./data/trend_examples:/app/data/trend_examples
      - ./image:/app/image
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped

  cleanup:
    build: .
    command: ["uvicorn", "app.cleanup.main:app", "--host", "0.0.0.0", "--port", "8001"]
    env_file:
      - .env
    ports:
      - "127.0.0.1:8001:8001"
    volumes:
      - ./app:/app/app
      - ./migrations:/app/migrations
      - ./prompts:/app/prompts
      - ./data/generated_images:/data/generated_images
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8001/health || exit 1"]
      interval: 10s
      timeout: 3s
      retries: 5

  db:
    image: postgres:16
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-trends}
      POSTGRES_USER: ${POSTGRES_USER:-trends}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-trends}
    ports:
      - "127.0.0.1:5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-trends} -d ${POSTGRES_DB:-trends}"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7
    # AOF (append-only file) — данные переживут перезапуск и сбой процесса
    command: ["redis-server", "--requirepass", "${REDIS_PASSWORD}", "--appendonly", "yes"]
    ports:
      - "127.0.0.1:6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  prometheus:
    image: prom/prometheus:v2.47.0
    ports:
      - "127.0.0.1:9090:9090"
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--web.enable-lifecycle"
    depends_on:
      api:
        condition: service_healthy
    restart: unless-stopped

  grafana:
    image: grafana/grafana:10.2.0
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_ADMIN_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD:-admin}
      GF_USERS_ALLOW_SIGN_UP: "false"
      GF_SERVER_ROOT_URL: ${GRAFANA_SERVER_ROOT_URL:-}
    ports:
      - "127.0.0.1:3001:3000"
    volumes:
      - grafana_data:/var/lib/grafana
    depends_on:
      - prometheus
    restart: unless-stopped

  node_exporter:
    image: prom/node-exporter:v1.6.1
    ports:
      - "9100:9100"
    command:
      - "--path.rootfs=/host"
    volumes:
      - "/:/host:ro,rslave"
    restart: unless-stopped

  redis_exporter:
    image: oliver006/redis_exporter:v1.55.0
    environment:
      REDIS_ADDR: "redis://redis:6379"
      REDIS_PASSWORD: ${REDIS_PASSWORD}
    ports:
      - "9121:9121"
    depends_on:
      redis:
        condition: service_healthy
    restart: unless-stopped

  postgres_exporter:
    image: prometheuscommunity/postgres-exporter:v0.15.0
    environment:
      DATA_SOURCE_NAME: "postgresql://${POSTGRES_USER:-trends}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB:-trends}?sslmode=disable"
    ports:
      - "9187:9187"
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

volumes:
  postgres_data:
  redis_data:
  prometheus_data:
  grafana_data:
