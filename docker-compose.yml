services:
  admin-ui:
    build:
      context: ./admin-frontend
      dockerfile: Dockerfile
    ports:
      - "3000:80"
    depends_on:
      api:
        condition: service_healthy

  api:
    build: .
    env_file:
      - .env
    ports:
      - "127.0.0.1:8000:8000"
    volumes:
      - ./app:/app/app
      - ./migrations:/app/migrations
      - ./prompts:/app/prompts
      - ./data/generated_images:/data/generated_images
      - ./data/trend_examples:/app/data/trend_examples
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped
    logging:
      driver: json-file
      options:
        max-size: "50m"
        max-file: "10"
    healthcheck:
      test: ["CMD-SHELL", "curl -f --connect-timeout 5 --max-time 10 http://localhost:8000/health || exit 1"]
      interval: 10s
      timeout: 10s
      retries: 6
      start_period: 60s

  worker:
    build: .
    command: ["celery", "-A", "app.core.celery_app.celery_app", "worker", "--loglevel=INFO", "--concurrency=2", "-Q", "celery,generation"]
    env_file:
      - .env
    ports:
      - "127.0.0.1:9091:9091"
    volumes:
      - ./app:/app/app
      - ./migrations:/app/migrations
      - ./prompts:/app/prompts
      - ./data/generated_images:/data/generated_images
      - ./image:/app/image
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped
    logging:
      driver: json-file
      options:
        max-size: "50m"
        max-file: "10"

  beat:
    build: .
    command: ["celery", "-A", "app.core.celery_app.celery_app", "beat", "--loglevel=INFO"]
    env_file:
      - .env
    volumes:
      - ./app:/app/app
    depends_on:
      redis:
        condition: service_healthy
    restart: unless-stopped

  bot:
    build: .
    command: ["python", "-m", "app.bot.main"]
    env_file:
      - .env
    ports:
      - "127.0.0.1:8002:8002"
    volumes:
      - ./app:/app/app
      - ./migrations:/app/migrations
      - ./prompts:/app/prompts
      - ./data/generated_images:/data/generated_images
      - ./data/trend_examples:/app/data/trend_examples
      - ./image:/app/image
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped
    logging:
      driver: json-file
      options:
        max-size: "50m"
        max-file: "10"

  cleanup:
    build: .
    command: ["uvicorn", "app.cleanup.main:app", "--host", "0.0.0.0", "--port", "8001"]
    env_file:
      - .env
    ports:
      - "127.0.0.1:8001:8001"
    volumes:
      - ./app:/app/app
      - ./migrations:/app/migrations
      - ./prompts:/app/prompts
      - ./data/generated_images:/data/generated_images
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8001/health || exit 1"]
      interval: 10s
      timeout: 3s
      retries: 5

  face-id-api:
    build:
      context: ./face-id-service
      dockerfile: Dockerfile
    env_file:
      - .env
    ports:
      - "127.0.0.1:8010:8010"
    volumes:
      - ./data/generated_images:/data/generated_images
    depends_on:
      redis:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8010/health', timeout=2).read()"]
      interval: 10s
      timeout: 3s
      retries: 5

  face-id-worker:
    build:
      context: ./face-id-service
      dockerfile: Dockerfile
    command: ["celery", "-A", "face_id_app.celery_app.celery_app", "worker", "--loglevel=INFO", "--concurrency=2", "-Q", "face_id"]
    env_file:
      - .env
    ports:
      - "127.0.0.1:9094:9094"
    environment:
      FACE_ID_WORKER_METRICS_PORT: "9094"
      CALLBACK_ALLOWED_HOSTS: "api,localhost,127.0.0.1,172.18.0.1,host.docker.internal"
    volumes:
      - ./data/generated_images:/data/generated_images
    depends_on:
      redis:
        condition: service_healthy
      face-id-api:
        condition: service_healthy
    restart: unless-stopped

  db:
    image: postgres:16
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-trends}
      POSTGRES_USER: ${POSTGRES_USER:-trends}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-trends}
    ports:
      - "127.0.0.1:5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-trends} -d ${POSTGRES_DB:-trends}"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7
    # AOF (append-only file) — данные переживут перезапуск и сбой процесса
    command: ["redis-server", "--requirepass", "${REDIS_PASSWORD}", "--appendonly", "yes"]
    ports:
      - "127.0.0.1:6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  prometheus:
    image: prom/prometheus:v2.47.0
    ports:
      - "127.0.0.1:9090:9090"
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--web.enable-lifecycle"
    depends_on:
      api:
        condition: service_healthy
    restart: unless-stopped

  grafana:
    image: grafana/grafana:10.2.0
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_ADMIN_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD:-admin}
      GF_USERS_ALLOW_SIGN_UP: "false"
      GF_SERVER_ROOT_URL: ${GRAFANA_SERVER_ROOT_URL:-}
    ports:
      - "127.0.0.1:3001:3000"
    volumes:
      - grafana_data:/var/lib/grafana
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./monitoring/dashboards:/etc/grafana/dashboards:ro
    depends_on:
      - prometheus
      - loki
    restart: unless-stopped

  loki:
    image: grafana/loki:2.9.8
    command: ["-config.file=/etc/loki/config.yml"]
    ports:
      - "127.0.0.1:3100:3100"
    volumes:
      - ./monitoring/loki/config.yml:/etc/loki/config.yml:ro
      - loki_data:/loki
    restart: unless-stopped

  promtail:
    image: grafana/promtail:2.9.8
    command: ["-config.file=/etc/promtail/config.yml"]
    ports:
      - "127.0.0.1:9080:9080"
    volumes:
      - ./monitoring/promtail/config.yml:/etc/promtail/config.yml:ro
      - /var/lib/docker/containers:/var/lib/docker/containers:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - promtail_positions:/var/lib/promtail
    depends_on:
      - loki
    restart: unless-stopped

  node_exporter:
    image: prom/node-exporter:v1.6.1
    ports:
      - "9100:9100"
    command:
      - "--path.rootfs=/host"
    volumes:
      - "/:/host:ro,rslave"
    restart: unless-stopped

  redis_exporter:
    image: oliver006/redis_exporter:v1.55.0
    environment:
      REDIS_ADDR: "redis://redis:6379"
      REDIS_PASSWORD: ${REDIS_PASSWORD}
    ports:
      - "9121:9121"
    depends_on:
      redis:
        condition: service_healthy
    restart: unless-stopped

  postgres_exporter:
    image: prometheuscommunity/postgres-exporter:v0.15.0
    environment:
      DATA_SOURCE_NAME: "postgresql://${POSTGRES_USER:-trends}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB:-trends}?sslmode=disable"
    ports:
      - "9187:9187"
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

volumes:
  postgres_data:
  redis_data:
  prometheus_data:
  grafana_data:
  loki_data:
  promtail_positions:
